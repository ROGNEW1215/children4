<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>科技守护童年 - 登录平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        techBlue: '#2563EB',
                        dangerRed: '#EF4444',
                        bgLight: '#f5f7fa'
                    }
                }
            }
        }
    </script>
    <style>
        body { -ms-overflow-style: none; scrollbar-width: none; }
        body::-webkit-scrollbar { display: none; }
        .glass-overlay { backdrop-filter: blur(4px); }
        #formBody { transition: opacity 0.2s ease; }
    </style>
</head>
<body class="bg-bgLight min-h-screen flex items-center justify-center sm:p-4">

    <div class="w-full min-h-screen sm:min-h-[auto] sm:max-w-[440px] bg-white sm:rounded-2xl sm:shadow-[0_8px_30px_rgb(0,0,0,0.08)] flex flex-col relative overflow-hidden">
        <div id="loadingBlocker" class="hidden absolute inset-0 z-[5] cursor-wait bg-white/0" aria-hidden="true"></div>
        <div class="p-6 sm:p-8 flex-1 flex flex-col">
            <div class="text-center mb-8 mt-4 sm:mt-0">
                <div class="w-12 h-12 bg-techBlue rounded-xl mx-auto mb-3 flex items-center justify-center shadow-lg shadow-blue-200">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 tracking-tight">科技守护童年</h1>
                <p class="text-sm text-gray-500 mt-1">智能危险预警与监控平台</p>
            </div>

            <div class="flex relative mb-6 border-b border-gray-200">
                <button type="button" id="tab-parent" onclick="switchRole('parent')" class="flex-1 pb-3 text-sm font-medium text-techBlue border-b-2 border-techBlue transition-colors duration-200">
                    家长端
                </button>
                <button type="button" id="tab-inst" onclick="switchRole('institution')" class="flex-1 pb-3 text-sm font-medium text-gray-500 hover:text-gray-800 transition-colors duration-200">
                    机构端
                </button>
            </div>

            <form id="loginForm" class="flex-1 flex flex-col" onsubmit="handleLogin(event)">
                <div id="formBody" class="flex-1 flex flex-col">
                    <div class="mb-4 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <input type="text" id="account" required autocomplete="username"
                            class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-100 focus:border-techBlue outline-none transition-all placeholder-gray-400"
                            placeholder="请输入注册手机号"
                            onblur="validateAccount()" oninput="toggleClearBtn()">
                        <button type="button" id="clearBtn" onclick="clearAccount()" class="absolute inset-y-0 right-0 pr-3 flex items-center hidden">
                            <svg class="h-4 w-4 text-gray-400 hover:text-gray-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
                        </button>
                        <p id="accountErr" class="text-dangerRed text-xs mt-1 hidden">手机号格式不正确</p>
                    </div>

                    <div id="loginModeToggle" class="flex justify-end gap-3 text-xs mb-3 -mt-1">
                        <button type="button" id="modePassword" onclick="setLoginMode('password')" class="text-techBlue font-medium">密码登录</button>
                        <span class="text-gray-300">|</span>
                        <button type="button" id="modeSms" onclick="setLoginMode('sms')" class="text-gray-500 hover:text-gray-700">验证码登录</button>
                    </div>

                    <div id="passwordRow" class="mb-4 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input type="password" id="password" autocomplete="current-password"
                            class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-100 focus:border-techBlue outline-none transition-all placeholder-gray-400"
                            placeholder="请输入密码（至少8位）"
                            onblur="validatePassword()">
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center" id="eyeBtn">
                            <svg id="eyeIcon" class="h-5 w-5 text-gray-400 hover:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                        <p id="passwordErr" class="text-dangerRed text-xs mt-1 hidden">密码长度不能少于8位</p>
                    </div>

                    <div id="smsRow" class="hidden mb-4">
                        <div class="relative flex gap-2">
                            <div class="flex-1 relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                </div>
                                <input type="text" inputmode="numeric" id="smsCode" maxlength="6"
                                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-100 focus:border-techBlue outline-none transition-all placeholder-gray-400"
                                    placeholder="请输入短信验证码"
                                    onblur="validateSmsCode()">
                            </div>
                            <button type="button" id="smsSendBtn" onclick="sendSmsCode()" class="shrink-0 px-3 py-2 text-sm font-medium text-white bg-techBlue rounded-lg hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed transition-colors whitespace-nowrap min-w-[104px]">
                                获取验证码
                            </button>
                        </div>
                        <p id="smsErr" class="text-dangerRed text-xs mt-1 hidden">请输入6位短信验证码</p>
                    </div>

                    <div id="instNotice" class="hidden mb-4 p-3 bg-blue-50 rounded-lg border border-blue-100 flex items-start">
                        <svg class="w-4 h-4 text-techBlue mt-0.5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="text-xs text-techBlue leading-relaxed">机构账号需绑定办学资质，如需接入请联系平台管理员。</p>
                    </div>

                    <div id="captchaWrap" class="mb-4">
                        <p class="text-xs text-gray-500 mb-2">安全验证：请拖动滑块完成验证</p>
                        <div id="sliderTrack" class="relative h-10 bg-gray-100 rounded-full border border-gray-200 overflow-hidden select-none touch-none">
                            <div id="sliderFill" class="absolute left-0 top-0 h-full bg-blue-100/80 rounded-l-full pointer-events-none" style="width:0"></div>
                            <div id="sliderThumb" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0" class="absolute left-0 top-0 w-10 h-10 bg-white border border-gray-300 rounded-full shadow flex items-center justify-center cursor-grab active:cursor-grabbing z-10 touch-none">
                                <svg class="w-4 h-4 text-techBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                            <span id="sliderHint" class="absolute inset-0 flex items-center justify-center text-xs text-gray-400 pointer-events-none pl-10">向右滑动解锁</span>
                            <span id="sliderOk" class="absolute inset-0 flex items-center justify-center text-xs text-green-600 font-medium pointer-events-none hidden">验证通过</span>
                        </div>
                        <p id="captchaErr" class="text-dangerRed text-xs mt-1 hidden">请先完成安全验证</p>
                    </div>

                    <details class="mb-4 group">
                        <summary class="text-xs text-gray-400 cursor-pointer list-none flex items-center gap-1 [&::-webkit-details-marker]:hidden">
                            <span class="group-open:rotate-90 transition-transform inline-block">▸</span>
                            演示选项（对接后端后可移除）
                        </summary>
                        <div class="mt-2 space-y-2 pl-4 border-l-2 border-gray-100">
                            <label class="flex items-center gap-2 text-xs text-gray-600 cursor-pointer">
                                <input type="checkbox" id="mockRisk2FA" class="rounded border-gray-300 text-techBlue focus:ring-techBlue">
                                <span>模拟风险登录（如新设备），成功后触发人脸识别</span>
                            </label>
                            <label class="flex items-center gap-2 text-xs text-gray-600 cursor-pointer">
                                <input type="checkbox" id="mockLoginFail" class="rounded border-gray-300 text-techBlue focus:ring-techBlue">
                                <span>模拟密码错误（演示「剩余尝试次数」文案）</span>
                            </label>
                        </div>
                    </details>
                </div>

                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center group cursor-pointer">
                        <input type="checkbox" id="agreement" class="w-4 h-4 text-techBlue border-gray-300 rounded focus:ring-techBlue cursor-pointer">
                        <span class="ml-2 text-xs text-gray-500 group-hover:text-gray-700 transition-colors">我已阅读并同意
                            <a href="#" class="text-techBlue hover:underline" onclick="event.stopPropagation()">《隐私政策与服务协议》</a>
                        </span>
                    </label>
                    <a href="#" class="text-xs text-gray-500 hover:text-techBlue transition-colors shrink-0 ml-2">忘记密码?</a>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-techBlue hover:bg-blue-700 text-white font-medium py-3 rounded-lg shadow-lg shadow-blue-500/30 transition-all flex justify-center items-center h-[48px]">
                    <span id="btnText">登 录</span>
                    <svg id="btnSpinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
                <p id="formErr" class="text-dangerRed text-xs mt-2 text-center hidden">请先阅读并同意隐私保护协议</p>
                <p id="loginApiErr" class="text-dangerRed text-xs mt-2 text-center hidden"></p>

                <div class="mt-6 text-center text-sm text-gray-500">
                    没有账号？ <a href="#" class="text-techBlue hover:underline font-medium">立即注册</a>
                </div>
            </form>
        </div>

        <div id="mfaLayer" class="absolute inset-0 bg-white/90 glass-overlay z-10 flex flex-col items-center justify-center p-6 transform translate-y-full transition-transform duration-300 hidden" aria-hidden="true">
            <div class="bg-white w-full rounded-2xl shadow-xl border border-gray-100 p-6 text-center">
                <div class="w-16 h-16 bg-blue-50 rounded-full mx-auto flex items-center justify-center mb-4 text-techBlue">
                    <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 11c1.657 0 3-1.12 3-2.5S13.657 6 12 6 9 7.12 9 8.5 10.343 11 12 11z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5.5 19.5c.5-3 3.5-5.5 6.5-5.5s6 2.5 6.5 5.5"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 4h10M9 4V3a1 1 0 011-1h4a1 1 0 011 1v1"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M4 9h16M4 14h10" opacity="0.45"></path>
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2">安全环境检测</h3>
                <p class="text-xs text-gray-500 mb-6">检测到新设备登录，为保障儿童数据安全，请进行身份核验。</p>
                
                <button type="button" onclick="mock2FASuccess()" class="w-full bg-techBlue hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition-colors mb-3">
                    开始人脸识别
                </button>
                <button type="button" onclick="close2FA()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-medium py-3 rounded-lg transition-colors">
                    返回修改
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentRole = 'parent';
        let loginMode = 'password';
        let isPwdVisible = false;
        let captchaVerified = false;
        let smsCooldown = 0;
        let smsTimer = null;
        let mockAuthAttemptsLeft = 3;

        const accountInput = document.getElementById('account');
        const passwordInput = document.getElementById('password');
        const smsCodeInput = document.getElementById('smsCode');
        const agreement = document.getElementById('agreement');
        const clearBtn = document.getElementById('clearBtn');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const mfaLayer = document.getElementById('mfaLayer');
        const formBody = document.getElementById('formBody');
        const passwordRow = document.getElementById('passwordRow');
        const smsRow = document.getElementById('smsRow');
        const loginModeToggle = document.getElementById('loginModeToggle');
        const sliderTrack = document.getElementById('sliderTrack');
        const sliderThumb = document.getElementById('sliderThumb');
        const sliderFill = document.getElementById('sliderFill');
        const sliderHint = document.getElementById('sliderHint');
        const sliderOk = document.getElementById('sliderOk');

        function switchRole(role) {
            formBody.style.opacity = '0';
            setTimeout(() => {
                currentRole = role;
                const tabParent = document.getElementById('tab-parent');
                const tabInst = document.getElementById('tab-inst');
                const instNotice = document.getElementById('instNotice');

                if (role === 'parent') {
                    tabParent.className = 'flex-1 pb-3 text-sm font-medium text-techBlue border-b-2 border-techBlue transition-colors duration-200';
                    tabInst.className = 'flex-1 pb-3 text-sm font-medium text-gray-500 hover:text-gray-800 transition-colors duration-200';
                    accountInput.placeholder = '请输入注册手机号';
                    instNotice.classList.add('hidden');
                    loginModeToggle.classList.remove('hidden');
                    setLoginMode(loginMode || 'password', true);
                } else {
                    tabInst.className = 'flex-1 pb-3 text-sm font-medium text-techBlue border-b-2 border-techBlue transition-colors duration-200';
                    tabParent.className = 'flex-1 pb-3 text-sm font-medium text-gray-500 hover:text-gray-800 transition-colors duration-200';
                    accountInput.placeholder = '请输入机构备案邮箱';
                    instNotice.classList.remove('hidden');
                    loginModeToggle.classList.add('hidden');
                    setLoginMode('password', true);
                }

                accountInput.value = '';
                passwordInput.value = '';
                smsCodeInput.value = '';
                toggleClearBtn();
                hideError('accountErr');
                hideError('passwordErr');
                hideError('smsErr');
                hideError('captchaErr');
                document.getElementById('loginApiErr').classList.add('hidden');
                resetCaptcha();
                formBody.style.opacity = '1';
            }, 120);
        }

        function setLoginMode(mode, silent) {
            loginMode = mode;
            const modePassword = document.getElementById('modePassword');
            const modeSms = document.getElementById('modeSms');
            if (currentRole !== 'parent') {
                loginMode = 'password';
            }
            if (loginMode === 'sms') {
                passwordRow.classList.add('hidden');
                smsRow.classList.remove('hidden');
                passwordInput.removeAttribute('required');
                modeSms.className = 'text-techBlue font-medium';
                modePassword.className = 'text-gray-500 hover:text-gray-700';
            } else {
                passwordRow.classList.remove('hidden');
                smsRow.classList.add('hidden');
                passwordInput.setAttribute('required', 'required');
                modePassword.className = 'text-techBlue font-medium';
                modeSms.className = 'text-gray-500 hover:text-gray-700';
            }
            hideError('passwordErr');
            hideError('smsErr');
            if (!silent) {
                passwordInput.value = '';
                smsCodeInput.value = '';
                isPwdVisible = false;
                passwordInput.type = 'password';
                syncEyeIcon();
            }
        }

        function syncEyeIcon() {
            const eyeIcon = document.getElementById('eyeIcon');
            if (isPwdVisible) {
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
            } else {
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        }

        function toggleClearBtn() {
            clearBtn.classList.toggle('hidden', accountInput.value.length === 0);
        }

        function clearAccount() {
            accountInput.value = '';
            accountInput.focus();
            toggleClearBtn();
            hideError('accountErr');
        }

        function togglePassword() {
            isPwdVisible = !isPwdVisible;
            passwordInput.type = isPwdVisible ? 'text' : 'password';
            syncEyeIcon();
        }

        function validateAccount() {
            const val = accountInput.value.trim();
            if (!val) return false;

            let isValid = true;
            if (currentRole === 'parent') {
                isValid = /^1[3-9]\d{9}$/.test(val);
                showError('accountErr', isValid, '手机号格式不正确，请输入11位有效手机号');
            } else {
                isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
                showError('accountErr', isValid, '请输入有效的机构备案邮箱地址');
            }
            return isValid;
        }

        function validatePassword() {
            const val = passwordInput.value;
            if (!val) return false;
            const isValid = val.length >= 8;
            showError('passwordErr', isValid, '密码长度不能少于8位');
            return isValid;
        }

        function validateSmsCode() {
            const val = (smsCodeInput.value || '').trim();
            if (!val) return false;
            const isValid = /^\d{6}$/.test(val);
            showError('smsErr', isValid, '请输入6位数字短信验证码');
            return isValid;
        }

        function showError(id, isValid, msg) {
            const errEl = document.getElementById(id);
            if (!isValid) {
                errEl.textContent = msg;
                errEl.classList.remove('hidden');
            } else {
                errEl.classList.add('hidden');
            }
        }

        function hideError(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function sendSmsCode() {
            if (smsCooldown > 0) return;
            if (!validateAccount()) {
                accountInput.focus();
                return;
            }
            smsCooldown = 60;
            updateSmsBtn();
            if (smsTimer) clearInterval(smsTimer);
            smsTimer = setInterval(() => {
                smsCooldown--;
                updateSmsBtn();
                if (smsCooldown <= 0) {
                    clearInterval(smsTimer);
                    smsTimer = null;
                }
            }, 1000);
        }

        function updateSmsBtn() {
            const btn = document.getElementById('smsSendBtn');
            if (smsCooldown > 0) {
                btn.disabled = true;
                btn.textContent = smsCooldown + 's后重试';
            } else {
                btn.disabled = false;
                btn.textContent = '获取验证码';
            }
        }

        function resetCaptcha() {
            captchaVerified = false;
            sliderThumb.style.left = '0px';
            sliderFill.style.width = '0';
            sliderHint.classList.remove('hidden');
            sliderOk.classList.add('hidden');
            sliderThumb.setAttribute('aria-valuenow', '0');
        }

        (function initSlider() {
            let dragging = false;
            let startX = 0;
            let startLeft = 0;

            function maxDx() {
                return Math.max(0, sliderTrack.offsetWidth - sliderThumb.offsetWidth);
            }

            function setSliderPx(px) {
                const max = maxDx();
                const x = Math.max(0, Math.min(px, max));
                sliderThumb.style.left = x + 'px';
                sliderFill.style.width = x + sliderThumb.offsetWidth / 2 + 'px';
                const pct = max ? Math.round((x / max) * 100) : 0;
                sliderThumb.setAttribute('aria-valuenow', String(pct));
                if (max && x >= max * 0.92) {
                    captchaVerified = true;
                    sliderHint.classList.add('hidden');
                    sliderOk.classList.remove('hidden');
                    sliderThumb.classList.add('border-green-500', 'text-green-600');
                } else {
                    captchaVerified = false;
                    sliderThumb.classList.remove('border-green-500', 'text-green-600');
                }
            }

            function onDown(clientX) {
                if (captchaVerified) return;
                dragging = true;
                startX = clientX;
                startLeft = parseFloat(sliderThumb.style.left) || 0;
            }

            function onMove(clientX) {
                if (!dragging || captchaVerified) return;
                const dx = clientX - startX;
                setSliderPx(startLeft + dx);
            }

            function onUp() {
                dragging = false;
                if (!captchaVerified) {
                    setSliderPx(0);
                    sliderHint.classList.remove('hidden');
                    sliderOk.classList.add('hidden');
                }
            }

            sliderThumb.addEventListener('mousedown', (e) => { e.preventDefault(); onDown(e.clientX); });
            window.addEventListener('mousemove', (e) => onMove(e.clientX));
            window.addEventListener('mouseup', onUp);

            sliderThumb.addEventListener('touchstart', (e) => { onDown(e.touches[0].clientX); }, { passive: true });
            window.addEventListener('touchmove', (e) => { if (dragging) onMove(e.touches[0].clientX); }, { passive: true });
            window.addEventListener('touchend', onUp);
        })();

        function validateCaptchaOrShow() {
            if (captchaVerified) {
                hideError('captchaErr');
                return true;
            }
            showError('captchaErr', false, '请先完成安全验证');
            return false;
        }

        function handleLogin(e) {
            e.preventDefault();
            document.getElementById('loginApiErr').classList.add('hidden');

            if (!agreement.checked) {
                document.getElementById('formErr').classList.remove('hidden');
                return;
            }
            document.getElementById('formErr').classList.add('hidden');

            if (!validateAccount()) return;

            if (currentRole === 'parent' && loginMode === 'sms') {
                if (!validateSmsCode()) return;
            } else {
                if (!validatePassword()) return;
            }

            if (!validateCaptchaOrShow()) return;

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.textContent = '验证中...';
            btnSpinner.classList.remove('hidden');
            const blocker = document.getElementById('loadingBlocker');
            blocker.classList.remove('hidden');
            blocker.setAttribute('aria-hidden', 'false');

            setTimeout(() => {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnText.textContent = '登 录';
                btnSpinner.classList.add('hidden');
                blocker.classList.add('hidden');
                blocker.setAttribute('aria-hidden', 'true');
                updateSmsBtn();

                const mockFail = document.getElementById('mockLoginFail').checked;
                const mockRisk = document.getElementById('mockRisk2FA').checked;

                if (mockFail) {
                    mockAuthAttemptsLeft = Math.max(0, mockAuthAttemptsLeft - 1);
                    const el = document.getElementById('loginApiErr');
                    el.textContent = '密码错误，您还有' + mockAuthAttemptsLeft + '次尝试机会';
                    el.classList.remove('hidden');
                    if (mockAuthAttemptsLeft <= 0) {
                        el.textContent = '尝试次数已用尽，请稍后再试或找回密码';
                    }
                    return;
                }

                mockAuthAttemptsLeft = 3;

                if (mockRisk) {
                    trigger2FA();
                } else {
                    completeLoginSuccess();
                }
            }, 1200);
        }

        function trigger2FA() {
            mfaLayer.classList.remove('hidden');
            mfaLayer.setAttribute('aria-hidden', 'false');
            requestAnimationFrame(() => {
                setTimeout(() => mfaLayer.classList.remove('translate-y-full'), 10);
            });
        }

        function close2FA() {
            mfaLayer.classList.add('translate-y-full');
            setTimeout(() => {
                mfaLayer.classList.add('hidden');
                mfaLayer.setAttribute('aria-hidden', 'true');
            }, 300);
        }

        function completeLoginSuccess() {
            const roleId = currentRole === 'parent' ? 'Parent' : 'Institution_Admin';
            if (currentRole === 'parent') {
                alert('登录成功\n\nRole_ID: ' + roleId + '\n正在跳转至：【实时监控页】');
            } else {
                alert('登录成功\n\nRole_ID: ' + roleId + '\n正在跳转至：【多画面概览大屏 / 设备节点状态】');
            }
        }

        function mock2FASuccess() {
            close2FA();
            setTimeout(() => {
                const roleId = currentRole === 'parent' ? 'Parent' : 'Institution_Admin';
                if (currentRole === 'parent') {
                    alert('身份核验通过\n\nRole_ID: ' + roleId + '\n正在跳转至：【实时监控页】');
                } else {
                    alert('身份核验通过\n\nRole_ID: ' + roleId + '\n正在跳转至：【多画面概览大屏】');
                }
            }, 300);
        }

        setLoginMode('password', true);
        resetCaptcha();
    </script>
</body>
</html>
