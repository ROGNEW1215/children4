<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>守护引擎 - 环境配置与规则设定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        techBlue: '#2563EB',
                        dangerRed: '#EF4444',
                        warningOrange: '#F59E0B',
                        successGreen: '#10B981',
                        bgLight: '#f5f7fa',
                        panelWhite: '#ffffff',
                    },
                    boxShadow: {
                        'float': '0 8px 30px rgba(0,0,0,0.06)',
                        'panel': '-4px 0 20px rgba(0,0,0,0.03)',
                        'tool': '4px 0 20px rgba(0,0,0,0.03)',
                    }
                }
            }
        }
    </script>
    <style>
        /* 隐藏滚动条，保持画布整洁 */
        ::-webkit-scrollbar { display: none; }
        body { user-select: none; }
        
        /* 画布区域样式 */
        #workspace-container {
            cursor: grab;
        }
        #workspace-container:active {
            cursor: grabbing;
        }
        .tool-active {
            background-color: #eff6ff;
            color: #2563EB;
            border-color: #2563EB;
        }
        
        /* 斑马纹冲突图案定义 */
        .zebra-pattern { fill: url(#zebra); opacity: 0.8; }
        
        /* 魔法棒加载动画 */
        .magic-scan {
            position: absolute;
            width: 100px; height: 100px;
            background: radial-gradient(circle, rgba(37,99,235,0.4) 0%, rgba(37,99,235,0) 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: scanPulse 1.5s ease-out infinite;
            pointer-events: none;
            z-index: 50;
        }
        @keyframes scanPulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
    </style>
</head>
<body class="bg-bgLight text-gray-800 h-screen w-screen overflow-hidden flex flex-col font-sans">

    <header class="h-14 bg-panelWhite shadow-sm flex items-center justify-between px-6 shrink-0 z-20">
        <div class="flex items-center space-x-4">
            <div class="w-8 h-8 bg-techBlue rounded-lg flex items-center justify-center shadow-md">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
            </div>
            <h1 class="font-bold text-gray-800 text-lg">环境规则配置</h1>
            <div class="h-4 w-px bg-gray-300 mx-2"></div>
            
            <select class="bg-gray-50 border border-gray-200 text-sm rounded-lg px-3 py-1.5 outline-none focus:ring-2 focus:ring-techBlue cursor-pointer font-medium">
                <option>大二班 - 主摄像头 (在线)</option>
                <option>午睡区 - 盲区补充</option>
                <option>上传静态平面图...</option>
            </select>
        </div>

        <div class="flex items-center space-x-3">
            <button class="flex items-center px-3 py-1.5 text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition border border-transparent">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> 刷新抓帧
            </button>
            <button onclick="saveAndDeploy()" class="flex items-center px-4 py-1.5 text-sm bg-techBlue text-white font-medium rounded-lg shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> 保存并下发规则
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative">

        <aside class="w-16 bg-panelWhite shadow-tool z-10 flex flex-col items-center py-4 space-y-3 shrink-0">
            <button onclick="setTool('select')" id="tool-select" class="w-10 h-10 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-100 transition border border-transparent tool-active" title="选择/编辑 (V)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
            </button>
            <button onclick="setTool('hand')" id="tool-hand" class="w-10 h-10 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-100 transition border border-transparent" title="平移画布 (Space)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0m-3 6a1.5 1.5 0 00-3 0v2a7.5 7.5 0 0015 0v-5a1.5 1.5 0 00-3 0m-6-3V11m0-5.5v-1a1.5 1.5 0 013 0v1m0 0V11m0-5.5a1.5 1.5 0 013 0v3m0 0V11"></path></svg>
            </button>
            <div class="w-8 h-px bg-gray-200 my-1"></div>
            <button onclick="setTool('magic')" id="tool-magic" class="w-10 h-10 rounded-xl flex items-center justify-center text-techBlue bg-blue-50 border border-blue-100 hover:bg-blue-100 transition shadow-sm relative group" title="AI 智能轮廓识别 (W)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                <span class="absolute -top-1 -right-1 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-techBlue opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-techBlue border border-white"></span></span>
            </button>
            <button onclick="setTool('rect')" id="tool-rect" class="w-10 h-10 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-100 transition border border-transparent" title="矩形区域 (R)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" stroke-width="2"></rect></svg>
            </button>
            <button onclick="setTool('polygon')" id="tool-polygon" class="w-10 h-10 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-100 transition border border-transparent" title="不规则多边形 (P)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2l8 5v10l-8 5-8-5V7l8-5z"></path></svg>
            </button>
            <div class="w-8 h-px bg-gray-200 my-1"></div>
            <button onclick="deleteSelected()" class="w-10 h-10 rounded-xl flex items-center justify-center text-gray-500 hover:bg-red-50 hover:text-dangerRed transition border border-transparent" title="删除选中节点 (Del)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </aside>

        <section class="flex-1 bg-gray-200 relative overflow-hidden flex items-center justify-center" id="canvas-wrapper">
            
            <div id="workspace-container" class="relative shadow-2xl transition-transform duration-100 origin-center" style="transform: scale(1) translate(0px, 0px); width: 800px; height: 500px;">
                
                <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1595123550441-d377e017ea6c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80')] bg-cover bg-center rounded overflow-hidden">
                    <div class="absolute inset-0 backdrop-blur-[1px] bg-black/10"></div>
                </div>

                <svg id="drawing-layer" class="absolute inset-0 w-full h-full z-10" onmousedown="handleCanvasClick(event)">
                    <defs>
                        <pattern id="zebra" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                            <rect width="10" height="20" fill="#EF4444" fill-opacity="0.5"/>
                            <rect x="10" width="10" height="20" fill="#FCA5A5" fill-opacity="0.8"/>
                        </pattern>
                    </defs>
                    </svg>

                <div id="magic-loading" class="hidden"></div>
            </div>

            <div class="absolute bottom-6 left-6 bg-panelWhite shadow-float rounded-xl p-1.5 flex items-center space-x-1 border border-gray-100">
                <button onclick="zoom(-0.1)" class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-500 hover:bg-gray-100"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg></button>
                <span id="zoom-level" class="text-xs font-mono text-gray-600 px-2 min-w-[50px] text-center">100%</span>
                <button onclick="zoom(0.1)" class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-500 hover:bg-gray-100"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg></button>
            </div>
        </section>

        <aside class="w-80 bg-panelWhite shadow-panel z-10 flex flex-col shrink-0 border-l border-gray-200">
            <div class="p-4 border-b border-gray-100 bg-gray-50/50">
                <h2 class="font-bold text-gray-800 text-sm flex items-center">
                    <svg class="w-4 h-4 mr-1.5 text-techBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    图层与规则管理
                </h2>
            </div>

            <div class="flex-1 overflow-y-auto p-4 flex flex-col">
                
                <div class="mb-6">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">空间图层 (Zones)</span>
                        <button onclick="checkConflicts()" class="text-[10px] bg-red-50 text-dangerRed px-2 py-0.5 rounded border border-red-100 hover:bg-red-100 transition hidden" id="conflict-btn">冲突警告!</button>
                    </div>
                    <div id="zone-list" class="space-y-2">
                        </div>
                </div>

                <div class="h-px bg-gray-100 my-2"></div>

                <div id="properties-panel" class="hidden flex-col space-y-4 pt-2">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">属性定义 (Properties)</span>
                    
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">区域名称</label>
                        <input type="text" id="prop-name" onchange="updateZoneProp('name', this.value)" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-techBlue outline-none text-gray-700">
                    </div>
                    
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">区域属性 (色彩语义)</label>
                        <select id="prop-type" onchange="updateZoneProp('type', this.value)" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-techBlue outline-none bg-white cursor-pointer">
                            <option value="danger">高危禁区 (危险红)</option>
                            <option value="warning">安全提示区 (警示橙)</option>
                            <option value="safe">安全活动区 (成功绿)</option>
                        </select>
                    </div>

                    <span class="text-xs font-bold text-gray-400 uppercase tracking-wider mt-2">触发规则 (Rule Engine)</span>

                    <div>
                        <label class="block text-xs text-gray-500 mb-1">触发条件</label>
                        <select id="prop-condition" onchange="updateZoneProp('condition', this.value)" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-techBlue outline-none bg-white cursor-pointer">
                            <option value="enter">进入该区域即触发</option>
                            <option value="stay">在该区域停留超过 5 秒</option>
                            <option value="leave">离开该区域</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-500 mb-1">绑定识别对象</label>
                        <select class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-techBlue outline-none bg-white cursor-pointer">
                            <option>全体人员 (默认)</option>
                            <option>仅儿童 (排除教师特征)</option>
                            <option>仅陌生人</option>
                        </select>
                    </div>

                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <label class="block text-xs text-gray-500 mb-2">警报联动动作</label>
                        <div class="space-y-2">
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" checked class="w-4 h-4 text-techBlue border-gray-300 rounded focus:ring-techBlue">
                                <span class="ml-2 text-xs text-gray-700">记录系统日志</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" checked class="w-4 h-4 text-techBlue border-gray-300 rounded focus:ring-techBlue">
                                <span class="ml-2 text-xs text-gray-700">推送 App 高危通知</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" id="prop-siren" class="w-4 h-4 text-techBlue border-gray-300 rounded focus:ring-techBlue">
                                <span class="ml-2 text-xs text-dangerRed font-medium">触发前端声光报警仪</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div id="no-selection" class="flex flex-col items-center justify-center text-center py-10 opacity-50">
                    <svg class="w-12 h-12 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                    <p class="text-sm text-gray-500">在画布中选中或绘制区域<br>以配置属性与规则</p>
                </div>
            </div>
        </aside>

        <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 flex flex-col items-center space-y-2"></div>
    </main>

    <script>
        // ----------------- 状态管理 -----------------
        let currentTool = 'select'; // select, hand, magic, rect, polygon
        let zones = [
            { id: 'zone_1', name: '活动安全区', type: 'safe', shape: 'rect', points: '100,100 400,100 400,300 100,300', condition: 'leave' }
        ];
        let selectedZoneId = null;
        let hasConflict = false;

        // 画布平移与缩放状态
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDraggingCanvas = false;
        let startX, startY;

        // DOM 元素获取
        const workspaceContainer = document.getElementById('workspace-container');
        const drawingLayer = document.getElementById('drawing-layer');
        const zoneListEl = document.getElementById('zone-list');
        const propertiesPanel = document.getElementById('properties-panel');
        const noSelectionPanel = document.getElementById('no-selection');

        // 色彩语义字典
        const colors = {
            danger: { fill: 'rgba(239, 68, 68, 0.3)', stroke: '#EF4444', text: '危险红' },
            warning: { fill: 'rgba(245, 158, 11, 0.3)', stroke: '#F59E0B', text: '警示橙' },
            safe: { fill: 'rgba(16, 185, 129, 0.2)', stroke: '#10B981', text: '成功绿' }
        };

        // ----------------- 初始化与渲染 -----------------
        function renderCanvas() {
            drawingLayer.innerHTML = `
                <defs>
                    <pattern id="zebra" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                        <rect width="10" height="20" fill="#EF4444" fill-opacity="0.6"/>
                        <rect x="10" width="10" height="20" fill="#FCA5A5" fill-opacity="0.8"/>
                    </pattern>
                </defs>
            `;

            zones.forEach(zone => {
                const isSelected = zone.id === selectedZoneId;
                const c = colors[zone.type];
                
                // 冲突模拟：如果是 danger 且有冲突 flag，则使用斑马纹
                const fillStyle = (hasConflict && zone.type === 'danger') ? 'url(#zebra)' : c.fill;

                let elementHTML = '';
                if (zone.shape === 'rect' || zone.shape === 'polygon') {
                    elementHTML = `
                        <polygon points="${zone.points}" 
                            fill="${fillStyle}" 
                            stroke="${isSelected ? '#2563EB' : c.stroke}" 
                            stroke-width="${isSelected ? '3' : '2'}"
                            ${isSelected ? 'stroke-dasharray="4,4" class="animate-[dash_1s_linear_infinite]"' : ''}
                            onclick="selectZone('${zone.id}', event)"
                            style="cursor: ${currentTool === 'select' ? 'pointer' : 'crosshair'}; transition: all 0.2s;" />
                    `;
                }

                // 绘制名称标签 (居中估算显示)
                const pts = zone.points.split(' ')[0].split(',');
                const labelHTML = `
                    <g transform="translate(${parseInt(pts[0]) + 10}, ${parseInt(pts[1]) + 20})">
                        <rect x="-5" y="-12" width="100" height="18" fill="rgba(0,0,0,0.6)" rx="4"/>
                        <text x="0" y="0" fill="white" font-size="10" font-family="sans-serif">${zone.name}</text>
                    </g>
                `;

                drawingLayer.insertAdjacentHTML('beforeend', elementHTML + labelHTML);
            });
            
            // 注入动画样式
            if(!document.getElementById('svg-anim')) {
                document.head.insertAdjacentHTML('beforeend', '<style id="svg-anim">@keyframes dash { to { stroke-dashoffset: -8; } }</style>');
            }
        }

        function renderZoneList() {
            zoneListEl.innerHTML = '';
            zones.forEach(zone => {
                const isSelected = zone.id === selectedZoneId;
                const activeClass = isSelected ? 'bg-blue-50 border-techBlue ring-1 ring-techBlue' : 'bg-white border-gray-200 hover:border-gray-300 hover:shadow-sm';
                const c = colors[zone.type];
                
                const html = `
                    <div onclick="selectZone('${zone.id}')" class="flex items-center p-2 rounded-lg border cursor-pointer transition ${activeClass}">
                        <div class="w-3 h-3 rounded-sm mr-3" style="background-color: ${c.stroke}"></div>
                        <div class="flex-1 truncate">
                            <p class="text-xs font-bold text-gray-800">${zone.name}</p>
                            <p class="text-[10px] text-gray-500">${c.text} · 规则激活</p>
                        </div>
                        ${hasConflict && zone.type==='danger' ? '<svg class="w-4 h-4 text-dangerRed animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>' : ''}
                    </div>
                `;
                zoneListEl.insertAdjacentHTML('beforeend', html);
            });
        }

        function updatePropertiesPanel() {
            if (!selectedZoneId) {
                propertiesPanel.classList.add('hidden');
                propertiesPanel.classList.remove('flex');
                noSelectionPanel.classList.remove('hidden');
                noSelectionPanel.classList.add('flex');
                return;
            }
            
            propertiesPanel.classList.remove('hidden');
            propertiesPanel.classList.add('flex');
            noSelectionPanel.classList.add('hidden');
            noSelectionPanel.classList.remove('flex');

            const zone = zones.find(z => z.id === selectedZoneId);
            document.getElementById('prop-name').value = zone.name;
            document.getElementById('prop-type').value = zone.type;
            document.getElementById('prop-condition').value = zone.condition || 'enter';
        }

        // ----------------- 交互控制 -----------------
        function setTool(toolId) {
            currentTool = toolId;
            // 更新 UI
            ['select', 'hand', 'magic', 'rect', 'polygon'].forEach(id => {
                const btn = document.getElementById(`tool-${id}`);
                if(btn) {
                    if(id === toolId) btn.classList.add('tool-active');
                    else btn.classList.remove('tool-active');
                }
            });

            // 更新画布光标
            if(toolId === 'hand') workspaceContainer.style.cursor = 'grab';
            else if(toolId === 'magic') workspaceContainer.style.cursor = 'crosshair';
            else workspaceContainer.style.cursor = 'default';
        }

        function selectZone(id, event) {
            if (currentTool !== 'select') return;
            if (event) event.stopPropagation();
            selectedZoneId = id;
            renderCanvas();
            renderZoneList();
            updatePropertiesPanel();
        }

        function updateZoneProp(key, value) {
            if (!selectedZoneId) return;
            const zone = zones.find(z => z.id === selectedZoneId);
            if (zone) {
                zone[key] = value;
                renderCanvas();
                renderZoneList();
            }
        }

        function deleteSelected() {
            if (!selectedZoneId) {
                showToast('请先选中一个区域', 'warning');
                return;
            }
            zones = zones.filter(z => z.id !== selectedZoneId);
            selectedZoneId = null;
            hasConflict = false;
            document.getElementById('conflict-btn').classList.add('hidden');
            renderCanvas();
            renderZoneList();
            updatePropertiesPanel();
            showToast('已删除选中图层', 'success');
        }

        // ----------------- 核心功能模拟 -----------------
        
        // 1. 画布缩放与平移 (Pan & Zoom)
        const wrapper = document.getElementById('canvas-wrapper');
        
        wrapper.addEventListener('wheel', (e) => {
            if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                zoom(delta);
            }
        });

        function zoom(delta) {
            scale = Math.max(0.5, Math.min(scale + delta, 3));
            document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%';
            applyTransform();
        }

        wrapper.addEventListener('mousedown', (e) => {
            if (currentTool === 'hand' || e.code === 'Space') {
                isDraggingCanvas = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                workspaceContainer.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDraggingCanvas) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            applyTransform();
        });

        window.addEventListener('mouseup', () => {
            isDraggingCanvas = false;
            if (currentTool === 'hand') workspaceContainer.style.cursor = 'grab';
        });

        function applyTransform() {
            workspaceContainer.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        // 2. AI 魔法棒自动语义分割 (Mock)
        function handleCanvasClick(e) {
            if (currentTool === 'select') {
                selectedZoneId = null; // 点击空白处取消选中
                renderCanvas();
                renderZoneList();
                updatePropertiesPanel();
                return;
            }

            if (currentTool === 'magic') {
                // 获取相对画布坐标
                const rect = drawingLayer.getBoundingClientRect();
                const x = (e.clientX - rect.left) / scale;
                const y = (e.clientY - rect.top) / scale;

                // 呈现 Loading 动画
                const loader = document.getElementById('magic-loading');
                loader.className = 'magic-scan';
                loader.style.left = x + 'px';
                loader.style.top = y + 'px';

                // 模拟网络请求与模型推理延迟
                setTimeout(() => {
                    loader.className = 'hidden';
                    const newId = 'zone_' + Date.now();
                    // 模拟在点击位置生成一个不规则多边形轮廓 (比如茶几)
                    const p1 = `${x-60},${y-40}`;
                    const p2 = `${x+50},${y-30}`;
                    const p3 = `${x+80},${y+40}`;
                    const p4 = `${x-40},${y+60}`;
                    
                    zones.push({
                        id: newId,
                        name: '智能识别区 ' + zones.length,
                        type: 'danger',
                        shape: 'polygon',
                        points: `${p1} ${p2} ${p3} ${p4}`,
                        condition: 'enter'
                    });
                    
                    selectedZoneId = newId; // 自动选中新建项
                    setTool('select'); // 恢复选择工具
                    renderCanvas();
                    renderZoneList();
                    updatePropertiesPanel();

                    // 模拟冲突检测 (当图层>=2时出现)
                    if (zones.length >= 2) {
                        hasConflict = true;
                        document.getElementById('conflict-btn').classList.remove('hidden');
                        showToast('检测到区域物理重叠！已默认开启危险隔离预警', 'danger');
                        renderCanvas();
                        renderZoneList();
                    }

                }, 1200);
            }
        }

        // 3. 保存与下发 (坐标映射模拟)
        function saveAndDeploy() {
            showToast('✅ 坐标系已映射转换并成功下发至 YOLOv11 边缘节点', 'success');
            // Mock: 发送 JSON 规则引擎配置
            console.log("Deployed Payload:", JSON.stringify(zones, null, 2));
        }

        // 冲突展示按钮
        function checkConflicts() {
            showToast('⚠️ 斑马纹闪烁区域发生物理重叠，系统已优先执行高危禁区规则。', 'warning');
        }

        // Toast 提示系统
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const bg = type === 'success' ? 'bg-gray-800' : (type === 'warning' ? 'bg-orange-500' : 'bg-dangerRed');
            
            const toast = document.createElement('div');
            toast.className = `${bg} text-white px-6 py-3 rounded-full shadow-2xl text-sm font-medium flex items-center transform transition-all duration-300 translate-y-[-20px] opacity-0`;
            toast.innerHTML = msg;
            
            container.appendChild(toast);
            
            // 触发滑入
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-[-20px]', 'opacity-0');
            });
            
            // 定时销毁
            setTimeout(() => {
                toast.classList.add('translate-y-[-20px]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 初始化渲染
        renderCanvas();
        renderZoneList();
        updatePropertiesPanel();

    </script>
</body>
</html>
