<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>守护引擎 - 预警事件与回放</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2563EB',
                        dangerRed: '#EF4444',
                        warningOrange: '#F59E0B',
                        successGreen: '#10B981',
                        bgLight: '#f5f7fa'
                    },
                    boxShadow: {
                        'float': '0 10px 30px -10px rgba(0, 0, 0, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 抽屉与遮罩动画 */
        .drawer-open { transform: translateX(0) !important; }
        .backdrop-open { opacity: 1 !important; pointer-events: auto !important; }
        
        /* 卡片标记误报后的视觉降级 */
        .card-dismissed { filter: grayscale(100%); opacity: 0.6; pointer-events: none; }
        .card-dismissed .text-title { text-decoration: line-through; }
    </style>
</head>
<body class="bg-bgLight text-gray-800 h-screen overflow-hidden flex font-sans">

    <aside class="w-20 bg-white border-r border-gray-100 flex flex-col items-center py-6 hidden md:flex z-10">
        <div class="w-10 h-10 bg-brand rounded-xl flex items-center justify-center mb-10 shadow-lg shadow-blue-200 text-white font-bold">Pro</div>
        <nav class="space-y-6">
            <a href="#" class="p-3 text-gray-400 hover:text-brand hover:bg-blue-50 rounded-xl transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z"></path></svg></a>
            <a href="#" class="p-3 text-brand bg-blue-50 rounded-xl transition flex"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg></a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        
        <header class="pt-6 px-8 pb-4">
            <h1 class="text-2xl font-bold text-gray-800">预警事件与回放</h1>
            <p class="text-sm text-gray-500 mt-1">历史风险追溯与模型校准</p>
        </header>

        <div class="px-8 pb-4 z-10 relative">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-wrap gap-4 items-center justify-between">
                
                <div class="flex flex-wrap items-center gap-4">
                    <div class="flex bg-gray-50 p-1 rounded-lg border border-gray-100">
                        <button onclick="filterData('time', 'today')" class="px-4 py-1.5 text-sm font-medium rounded-md bg-white shadow-sm text-brand">今日</button>
                        <button onclick="filterData('time', '7days')" class="px-4 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-800 transition">近7天</button>
                        <button onclick="filterData('time', '30days')" class="px-4 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-800 transition">近30天</button>
                    </div>

                    <div class="h-6 w-px bg-gray-200 hidden md:block"></div>

                    <select id="riskFilter" onchange="applyFilters()" class="text-sm border border-gray-200 rounded-lg py-2 px-3 focus:ring-2 focus:ring-blue-100 outline-none text-gray-600 cursor-pointer">
                        <option value="all">所有危险等级</option>
                        <option value="high">高危事件</option>
                        <option value="medium">中危事件</option>
                        <option value="low">低危事件</option>
                    </select>

                    <select id="typeFilter" onchange="applyFilters()" class="text-sm border border-gray-200 rounded-lg py-2 px-3 focus:ring-2 focus:ring-blue-100 outline-none text-gray-600 cursor-pointer">
                        <option value="all">所有行为类型</option>
                        <option value="跌倒">异常跌倒</option>
                        <option value="攀爬">尝试攀爬</option>
                        <option value="越界">越界闯入</option>
                    </select>
                </div>

                <div class="flex items-center gap-3">
                    <button onclick="resetFilters()" class="text-sm text-gray-500 hover:text-gray-800 flex items-center transition">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> 重置
                    </button>
                    <button class="bg-brand hover:bg-blue-700 text-white text-sm px-4 py-2 rounded-lg shadow-md shadow-blue-500/30 transition flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> 导出日志
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-8 pb-8" id="feedContainer">
            <div id="loadingState" class="hidden flex justify-center py-20">
                <svg class="animate-spin h-8 w-8 text-brand" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </div>

            <div id="emptyState" class="hidden flex-col items-center justify-center py-20">
                <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-12 h-12 text-successGreen" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <p class="text-gray-500 font-medium">当前筛选条件下未检测到任何异常行为</p>
                <p class="text-sm text-gray-400 mt-1">孩子们都很安全</p>
            </div>

            <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </div>

    </main>

    <div id="drawerBackdrop" onclick="closeDrawer()" class="fixed inset-0 bg-gray-900/30 backdrop-blur-sm z-40 opacity-0 pointer-events-none transition-opacity duration-300"></div>
    
    <div id="playbackDrawer" class="fixed inset-y-0 right-0 w-full md:w-[480px] bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50 flex flex-col">
        <div class="flex items-center justify-between p-5 border-b border-gray-100">
            <div>
                <h2 class="text-lg font-bold text-gray-800 flex items-center">
                    事件回溯分析 <span id="drawerBadge" class="ml-3 text-xs px-2 py-0.5 rounded text-white bg-dangerRed">高危</span>
                </h2>
                <p id="drawerTimeLoc" class="text-xs text-gray-500 mt-1">2026-03-29 14:23:05 · 大二班 - 窗户区</p>
            </div>
            <button onclick="closeDrawer()" class="p-2 text-gray-400 hover:text-gray-600 bg-gray-50 rounded-full transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-5">
            <div class="mb-6">
                <div class="w-full bg-black rounded-xl overflow-hidden relative shadow-lg group">
                    <div class="aspect-video bg-[url('https://images.unsplash.com/photo-1595123550441-d377e017ea6c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80')] bg-cover bg-center opacity-70"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center cursor-pointer hover:bg-white/30 transition group-hover:scale-110">
                            <svg class="w-6 h-6 text-white ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                        </div>
                    </div>
                    <div class="absolute bottom-0 w-full p-3 bg-gradient-to-t from-black/80 to-transparent">
                        <div class="flex items-center justify-between text-xs text-white mb-1">
                            <span>-00:05</span>
                            <span class="text-dangerRed font-bold flex items-center"><span class="w-1.5 h-1.5 rounded-full bg-dangerRed animate-ping mr-1"></span> 触发点</span>
                            <span>+00:10</span>
                        </div>
                        <div class="w-full h-1.5 bg-gray-600 rounded-full relative">
                            <div class="absolute left-0 top-0 h-full bg-brand rounded-full w-1/3"></div>
                            <div class="absolute top-1/2 left-1/3 -translate-y-1/2 -translate-x-1/2 w-2 h-4 bg-dangerRed rounded-sm shadow-[0_0_5px_red]"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 rounded-xl p-4 mb-6 border border-gray-100">
                <h3 class="text-sm font-bold text-gray-800 mb-3 flex items-center">
                    <svg class="w-4 h-4 mr-1.5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m14-6h2m-2 6h2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                    模型研判报告
                </h3>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between"><span class="text-gray-500">主行为判定:</span> <strong id="drawerAiResult" class="text-gray-800">高坠风险</strong></div>
                    <div class="flex justify-between"><span class="text-gray-500">综合置信度:</span> <span class="text-gray-800 font-mono">96.4%</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">检测算法:</span> <span class="text-gray-800">YOLOv11-Pose</span></div>
                    <div class="flex justify-between items-start mt-2 pt-2 border-t border-gray-200">
                        <span class="text-gray-500 shrink-0">环境感知:</span> 
                        <span class="text-right text-xs bg-orange-100 text-orange-600 px-2 py-0.5 rounded">未发现护栏防护</span>
                    </div>
                </div>
            </div>

            <div>
                <h3 class="text-sm font-bold text-gray-800 mb-2">人工复核记录</h3>
                <textarea class="w-full border border-gray-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none transition resize-none h-24" placeholder="输入处理备注，形成闭环记录（例如：已通知当班老师移除危险物）..."></textarea>
                <div class="mt-3 flex gap-3">
                    <button class="flex-1 bg-brand hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition text-sm shadow-md">保存并归档</button>
                    <button class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 rounded-lg transition text-sm">标记为事故记录 (加密锁存)</button>
                </div>
                <p class="text-[10px] text-gray-400 mt-2 text-center">加密锁存后，数据将强制保留至少 180 天且无法删除</p>
            </div>
        </div>
    </div>

    <script>
        // ----------------- Mock 数据 -----------------
        const mockEvents = [
            {
                id: 'EVT-001',
                time: '14:23:05',
                location: '大二班 - 窗户区',
                risk: 'high',
                type: '攀爬',
                status: '未处理',
                aiResult: '高坠风险',
                confidence: 96,
                img: 'https://images.unsplash.com/photo-1502086223501-7ea6ecd79368?auto=format&fit=crop&w=400&q=80',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>' // 模拟攀爬/上升趋势
            },
            {
                id: 'EVT-002',
                time: '13:10:22',
                location: '室外操场 - 滑梯区',
                risk: 'medium',
                type: '跌倒',
                status: '已确认',
                aiResult: '异常跌倒',
                confidence: 88,
                img: 'https://images.unsplash.com/photo-1605556209259-86927361a357?auto=format&fit=crop&w=400&q=80',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>' // 向下箭头
            },
            {
                id: 'EVT-003',
                time: '11:45:10',
                location: '小一班 - 洗手间',
                risk: 'medium',
                type: '越界',
                status: '系统误报',
                aiResult: '靠近湿滑区域',
                confidence: 72,
                img: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=400&q=80',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>'
            },
            {
                id: 'EVT-004',
                time: '09:15:30',
                location: '园区大门',
                risk: 'low',
                type: '越界',
                status: '未处理',
                aiResult: '人员徘徊',
                confidence: 65,
                img: 'https://images.unsplash.com/photo-1541829070764-84a7d30dd3f3?auto=format&fit=crop&w=400&q=80',
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>'
            }
        ];

        const cardGrid = document.getElementById('cardGrid');
        const emptyState = document.getElementById('emptyState');

        // ----------------- 渲染与过滤逻辑 -----------------
        function renderCards(data) {
            cardGrid.innerHTML = '';
            
            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
            }

            data.forEach(item => {
                // 色彩语义定义
                const riskColorMap = {
                    high: { border: 'border-l-dangerRed', text: 'text-dangerRed', bg: 'bg-red-50' },
                    medium: { border: 'border-l-warningOrange', text: 'text-warningOrange', bg: 'bg-orange-50' },
                    low: { border: 'border-l-brand', text: 'text-brand', bg: 'bg-blue-50' }
                };
                const style = riskColorMap[item.risk];
                const isDismissed = item.status === '系统误报';

                const cardHTML = `
                    <div id="${item.id}" class="bg-white rounded-xl shadow-float border-l-4 ${style.border} border-y border-r border-gray-100 overflow-hidden transition-all duration-300 hover:-translate-y-1 hover:shadow-xl ${isDismissed ? 'card-dismissed' : ''}">
                        <div class="h-36 relative group cursor-pointer bg-gray-900" onclick="openDrawer('${item.id}')">
                            <img src="${item.img}" class="w-full h-full object-cover opacity-80 group-hover:opacity-40 transition-opacity duration-300" alt="脱敏截图" style="filter: blur(2px);">
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                <div class="bg-black/50 text-white text-xs px-3 py-1.5 rounded-full flex items-center backdrop-blur-md">
                                    <svg class="w-4 h-4 mr-1 animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg> 预览 15s 回放
                                </div>
                            </div>
                            <span class="absolute top-2 right-2 text-[10px] px-2 py-0.5 rounded shadow-sm font-medium ${
                                item.status === '未处理' ? 'bg-white text-gray-600' : 
                                item.status === '已确认' ? 'bg-successGreen text-white' : 'bg-gray-200 text-gray-500'
                            }">${item.status}</span>
                        </div>
                        
                        <div class="p-4">
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center text-xs text-gray-500 font-mono">
                                    <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    ${item.time}
                                </div>
                                <div class="text-xs text-gray-500 flex items-center truncate max-w-[120px]">
                                    <svg class="w-3.5 h-3.5 mr-1 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                    ${item.location}
                                </div>
                            </div>
                            
                            <div class="flex items-start mt-3 mb-4">
                                <div class="${style.bg} ${style.text} p-1.5 rounded mr-2 mt-0.5">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">${item.icon}</svg>
                                </div>
                                <div>
                                    <h3 class="text-sm font-bold text-title text-gray-800 leading-snug">${item.aiResult} <span class="text-xs font-normal text-gray-500 ml-1">(${item.confidence}%)</span></h3>
                                    <p class="text-[10px] text-gray-400 mt-0.5">行为分类: ${item.type}</p>
                                </div>
                            </div>
                            
                            <div class="flex gap-2 border-t border-gray-100 pt-3">
                                <button onclick="openDrawer('${item.id}')" class="flex-1 bg-brand text-white text-xs py-1.5 rounded hover:bg-blue-700 transition">详情</button>
                                <button onclick="markFalseAlarm('${item.id}')" class="flex-1 bg-gray-50 text-gray-600 border border-gray-200 text-xs py-1.5 rounded hover:bg-gray-100 transition" title="将切片加入难例挖掘集">标记误报</button>
                            </div>
                        </div>
                    </div>
                `;
                cardGrid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // 初始化渲染
        renderCards(mockEvents);

        // 过滤功能
        function applyFilters() {
            const riskVal = document.getElementById('riskFilter').value;
            const typeVal = document.getElementById('typeFilter').value;
            
            let filtered = mockEvents;
            if (riskVal !== 'all') filtered = filtered.filter(e => e.risk === riskVal);
            if (typeVal !== 'all') filtered = filtered.filter(e => e.type === typeVal);
            
            // 模拟 Loading 延迟增加真实感
            cardGrid.innerHTML = '';
            document.getElementById('loadingState').classList.remove('hidden');
            emptyState.classList.add('hidden');
            
            setTimeout(() => {
                document.getElementById('loadingState').classList.add('hidden');
                renderCards(filtered);
            }, 400);
        }

        function filterData(type, val) {
            // 模拟时间切换，重置并轻微打乱数据
            applyFilters(); 
        }

        function resetFilters() {
            document.getElementById('riskFilter').value = 'all';
            document.getElementById('typeFilter').value = 'all';
            applyFilters();
        }

        // ----------------- 交互功能 -----------------
        
        // 难例挖掘 (标记误报) 反馈
        function markFalseAlarm(id) {
            const card = document.getElementById(id);
            if(card.classList.contains('card-dismissed')) return;

            // UI 状态降级
            card.classList.add('card-dismissed');
            
            // 模拟向后台静默发送视频切片作为负样本
            console.log(`[模型迭代] 已提取事件 ${id} 前后片段，作为 Hard Negative 样本存入 YOLOv11 训练队列。`);
            
            // 提示用户
            const toast = document.createElement('div');
            toast.className = 'fixed top-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl text-sm z-50 flex items-center transition-all duration-300 translate-y-[-20px] opacity-0';
            toast.innerHTML = '<svg class="w-4 h-4 mr-2 text-successGreen" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> 已标记误报，模型将自动学习优化';
            document.body.appendChild(toast);
            
            setTimeout(() => { toast.classList.remove('translate-y-[-20px]', 'opacity-0'); }, 10);
            setTimeout(() => { 
                toast.classList.add('translate-y-[-20px]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 抽屉管理
        const drawer = document.getElementById('playbackDrawer');
        const backdrop = document.getElementById('drawerBackdrop');

        function openDrawer(id) {
            // 根据 ID 找到对应数据填充 Drawer (简易绑定)
            const eventData = mockEvents.find(e => e.id === id);
            if(eventData) {
                document.getElementById('drawerTimeLoc').textContent = `2026-03-29 ${eventData.time} · ${eventData.location}`;
                document.getElementById('drawerAiResult').textContent = eventData.aiResult;
                
                const badge = document.getElementById('drawerBadge');
                badge.textContent = eventData.risk === 'high' ? '高危' : (eventData.risk === 'medium' ? '中危' : '低危');
                badge.className = `ml-3 text-xs px-2 py-0.5 rounded text-white ${eventData.risk === 'high' ? 'bg-dangerRed' : (eventData.risk === 'medium' ? 'bg-warningOrange' : 'bg-brand')}`;
            }

            drawer.classList.add('drawer-open');
            backdrop.classList.add('backdrop-open');
        }

        function closeDrawer() {
            drawer.classList.remove('drawer-open');
            backdrop.classList.remove('backdrop-open');
        }
    </script>
</body>
</html>
